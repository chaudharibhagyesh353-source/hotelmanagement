{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | RestaurantPro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="login-page">
    
    <div class="login-wrapper">
        <div class="card login-card">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="brand-icon mx-auto mb-3">
                        <i class="bi bi-cup-hot-fill text-white"></i>
                    </div>
                    <h3 class="fw-bold">Welcome Back</h3>
                    <p class="text-muted small">Enter your credentials to access the dashboard</p>
                </div>

                {% if form.errors %}
                <div class="alert alert-danger small py-2">Invalid username or password.</div>
                {% endif %}

                <form method="post" action="{% url 'login' %}">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Username</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0"><i class="bi bi-person text-muted"></i></span>
                            <input type="text" name="username" class="form-control border-start-0" placeholder="admin_user" required autofocus>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-semibold">Password</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0"><i class="bi bi-lock text-muted"></i></span>
                            <input type="password" name="password" class="form-control border-start-0" placeholder="••••••••" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">
                        Sign In <i class="bi bi-arrow-right ms-2"></i>
                    </button>
                </form>
                
                <div class="text-center mt-4">
                    <a href="{% url 'password_reset' %}" class="text-decoration-none small text-muted">Forgot password?</a>
                    <p class="small text-muted mt-3 mb-0">
    Don't have an account? 
    <a href="{% url 'register' %}" class="text-decoration-none fw-semibold">Register here</a>
</p>
                </div>
            </div>
        </div>
        <p class="text-center mt-4 text-muted small">© 2026 RestaurantPro Management System</p>
    </div>

</body>
</html>
